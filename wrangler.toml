# wrangler.toml
# Configuração do Worker Praevisus para Cloudflare

name = "praevisus"
main = "src/index.js"
compatibility_date = "2024-12-18"

# 🔁 Executa a cada 15 minutos
[triggers]
crons = ["*/15 * * * *"]

# 🗄️ Armazenamento de histórico (KV)
[[kv_namespaces]]
binding = "MONITOR_KV"
id = "164af2869f4d4b91a52634d7c149a45b"

# 🔑 Variáveis de ambiente (a chave será configurada depois)
[vars]
# NVIDIA_API_KEY será definida via wrangler secret
